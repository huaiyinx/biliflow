<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ up_name }} · 笔记重构</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Plus Jakarta Sans','Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background: radial-gradient(circle at 15% 15%, rgba(139, 92, 246, 0.2) 0%, transparent 60%),
              radial-gradient(circle at 85% 85%, rgba(244, 114, 182, 0.12) 0%, transparent 55%),
              radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 70%),
              #030208;
  background-attachment: fixed;
  color:#f1f5f9;
  padding:40px 24px;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    linear-gradient(rgba(255, 255, 255, 0.008) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.008) 1px, transparent 1px);
  background-size: 80px 80px;
  z-index: -1;
  pointer-events: none;
}
body::after {
  content: "";
  position: fixed;
  top: -10%;
  left: 30%;
  width: 60vw;
  height: 60vw;
  background: radial-gradient(circle, rgba(167, 139, 250, 0.1) 0%, transparent 70%);
  filter: blur(130px);
  z-index: -2;
  pointer-events: none;
}
.container{max-width:1600px;width:95%;margin:0 auto}
h1{font-size:1.75rem;margin-bottom:6px;background:linear-gradient(135deg, #c084fc, #f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.subtitle{color:#94a3b8;font-size:.88rem;margin-bottom:28px;font-weight:500;letter-spacing:0.5px}
.back-link{display:inline-block;margin-bottom:20px;color:#94a3b8;font-size:.88rem;transition:all .3s cubic-bezier(0.16, 1, 0.3, 1);font-weight:600}
.back-link:hover{color:#f5d0fe;text-shadow: 0 0 8px rgba(216, 180, 254, 0.5)}
.pipeline{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap}
.stage{
  background:rgba(255, 255, 255, 0.012);
  backdrop-filter:blur(10px);
  border: none;
  border-radius:14px;
  padding:12px 22px;
  font-size:.85rem;
  color:#94a3b8;
  font-weight:700;
  transition:all .4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}
.stage.active{
  color:#ffffff;
  background:rgba(139, 92, 246, 0.16);
  text-shadow: 0 0 10px rgba(192, 132, 252, 0.8);
  box-shadow:0 15px 40px -10px rgba(167,139,250,0.45);
  animation:stagePulse 2.5s infinite;
}
@keyframes stagePulse{0%,100%{opacity:1;box-shadow:0 15px 40px -10px rgba(167,139,250,0.45)}50%{opacity:.75;box-shadow:0 5px 20px -10px rgba(167,139,250,0.15)}}
.stage.done{color:#6ee7b7;background:rgba(16, 185, 129, 0.08);text-shadow: 0 0 8px rgba(110, 231, 183, 0.4)}
.card{
  background:rgba(255, 255, 255, 0.015);
  backdrop-filter:blur(40px) saturate(160%);
  -webkit-backdrop-filter:blur(40px) saturate(160%);
  border: none;
  border-radius:28px;
  padding:36px;
  margin-bottom:28px;
  box-shadow:0 40px 100px -30px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.03);
}
.card h3{font-size:1.1rem;color:#f8fafc;margin-bottom:24px;font-weight:800;letter-spacing:0.5px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{
  background:rgba(255, 255, 255, 0.012);
  border: none;
  padding:18px 8px;
  border-radius:18px;
  text-align:center;
}
.stat .num{font-size:2.2rem;font-weight:800;letter-spacing:-1.2px}
.stat .num.ok{color:#34d399}
.stat .num.pending{color:#fbbf24}
.stat .num.fail{color:#f87171}
.stat .label{font-size:.78rem;color:#94a3b8;margin-top:8px;font-weight:600;letter-spacing:0.5px}
.progress-wrap{margin-bottom:20px}
.progress-bar{height:28px;background:rgba(255, 255, 255, 0.04);border-radius:14px;overflow:hidden;position:relative;border: none}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#8b5cf6,#c084fc,#f472b6);
  background-size:200% 100%;
  border-radius:14px;
  transition:width .5s ease;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding-right:16px;
  font-size:.85rem;
  font-weight:700;
  color:#fff;
  min-width:45px;
  animation:flowLight 2.5s linear infinite;
  box-shadow: 0 0 15px rgba(167, 139, 250, 0.4);
}
@keyframes flowLight{0%{background-position:0% 50%}100%{background-position:200% 50%}}
.progress-text{font-size:.88rem;color:#94a3b8;text-align:center;margin-top:8px;font-weight:600}
.recent{max-height:55vh;overflow-y:auto;padding-right:6px}
/* 优化最近列表的滚动条 */
.recent::-webkit-scrollbar {
  width: 6px;
}
.recent::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.01);
  border-radius: 3px;
}
.recent::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 3px;
}
.recent-item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 16px;
  border-bottom: none;
  font-size:.85rem;
  border-radius: 14px;
  transition: all 0.3s ease;
  margin-bottom: 6px;
  background: rgba(255, 255, 255, 0.005);
}
.recent-item:hover{
  background: rgba(255, 255, 255, 0.025);
  transform: translateX(4px);
}
.recent-item:last-child{border-bottom:none}
.recent-item .icon{font-size:1.2rem;width:24px;text-align:center}
.recent-item .title{flex:1;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.recent-item .tag{font-size:.7rem;padding:4px 10px;border-radius:8px;font-weight:700;letter-spacing:0.5px}
.recent-item .tag.ok{background:rgba(52, 211, 153, 0.08);color:#34d399}
.recent-item .tag.fail{background:rgba(248, 113, 113, 0.08);color:#f87171}
.recent-item .tag.cli{background:rgba(74, 222, 128, 0.08);color:#4ade80}
.recent-item .tag.sv{background:rgba(251, 191, 36, 0.08);color:#fbbf24}
.refresh{text-align:center;font-size:.82rem;color:#64748b;margin-top:24px;font-weight:600}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.dashboard-body{
  display: flex;
  flex-direction: column;
  gap: 28px;
}

@media(min-width:1024px){
  .dashboard-body{
    display: grid;
    grid-template-columns: 45fr 55fr;
    gap: 32px;
    align-items: start;
  }
}
@media(max-width:550px){
  body{padding:16px 12px}
  .stats{grid-template-columns:repeat(2,1fr);gap:12px}
  .stat .num{font-size:1.8rem}
  .pipeline{gap:8px}
  .stage{padding:9px 14px;font-size:.75rem}
  .container{width:100%}
}
</style>
</head>
<body>
<div class="container">
<a href="/up/{{ up_name }}" class="back-link">← 返回详情</a>
<h1>{{ up_name }} · Phase 3 全量重构</h1>
<p class="subtitle">bili CLI → yt-dlp → SenseVoice → Gemini → Obsidian</p>
<div class="pipeline">
  <div class="stage active" id="stageCLI">📡 bili CLI</div>
  <div class="stage" id="stageDL">⬇️ yt-dlp</div>
  <div class="stage" id="stageSV">🎤 SenseVoice</div>
  <div class="stage" id="stageLLM">🤖 Gemini</div>
  <div class="stage" id="stageOB">📝 Obsidian</div>
</div>

<div class="dashboard-body">
  <div class="card" style="margin-bottom:0">
    <h3>📊 总体进度</h3>
    <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%">0%</div></div></div>
    <div class="progress-text" id="progressInfo">初始化...</div>
    <div class="stats">
      <div class="stat"><div class="num ok" id="statOk">0</div><div class="label">✅ 成功</div></div>
      <div class="stat"><div class="num pending" id="statPend">0</div><div class="label">⏳ 待处理</div></div>
      <div class="stat"><div class="num fail" id="statFail">0</div><div class="label">❌ 失败</div></div>
      <div class="stat"><div class="num" style="color:#fbbf24" id="statSV">0</div><div class="label">🎤 SV备选</div></div>
    </div>
    <div class="stats" style="grid-template-columns:repeat(2,1fr)">
      <div class="stat"><div class="num" style="color:#c084fc;font-size:1.6rem" id="statRate">0</div><div class="label">📝 速度(篇/分)</div></div>
      <div class="stat"><div class="num" style="color:#64748b;font-size:1.6rem" id="statEta">-</div><div class="label">⏱️ 预计剩余</div></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:0">
    <h3>🔄 最近处理</h3>
    <div class="recent" id="recentList"><div style="color:#64748b;text-align:center;padding:20px">等待流水线产出...</div></div>
  </div>
</div>

<p class="refresh pulse" id="refreshText">🔄 每 2 秒自动刷新 · <span id="lastTime">--</span></p>
</div>
<script>
const PROGRESS_URL='/api/up/{{ up_name }}/progress';
let items=[],lastC=0,st=Date.now();
async function check(){
 try{
  const r=await fetch(PROGRESS_URL+'?t='+Date.now());
  if(!r.ok)throw new Error('nf');
  const d=await r.json();
  const pct=d.pct||0,total=d.total||0,cur=d.current||0,ok=d.ok||0,fail=d.fail||0,sv=d.sv_fallback||0,done=d.done||0,pro=ok+fail;
  document.getElementById('progressFill').style.width=Math.max(pct,1)+'%';
  document.getElementById('progressFill').textContent=pct+'%';
  document.getElementById('statOk').textContent=ok;
  document.getElementById('statPend').textContent=Math.max(0,total-cur);
  document.getElementById('statFail').textContent=fail;
  document.getElementById('statSV').textContent=sv;
  const elapsed=Math.max((Date.now()-st)/60000,.1);
  document.getElementById('statRate').textContent=(pro/elapsed).toFixed(1);
  const rem=total-cur,eta=pro>0?Math.round(rem/(pro/elapsed)):0;
  document.getElementById('statEta').textContent=eta>0?eta+' 分钟':'-';
  document.getElementById('progressInfo').textContent=`${cur}/${total} · 完成 ${ok} · 失败 ${fail}`;
  if(cur>lastC&&d.last){
    items.unshift({title:d.last,status:d.last_status||'ok',src:d.last_src||'',time:new Date().toLocaleTimeString()});
    if(items.length>25)items.pop(); lastC=cur;
  }
  document.getElementById('recentList').innerHTML=items.map(i=>
    `<div class="recent-item"><span class="icon">${i.status==='ok'?'✅':'❌'}</span><span class="title">${i.title}</span><span class="tag ${i.status}">${i.status==='ok'?'成功':'失败'}</span><span class="tag ${i.src==='CLI'?'cli':'sv'}">${i.src||''}</span><span style="color:#64748b;font-size:.75rem">${i.time}</span></div>`
  ).join('')||'<div style="color:#64748b;text-align:center;padding:20px">等待流水线产出...</div>';
  document.getElementById('lastTime').textContent=new Date().toLocaleTimeString();
  if(done){document.getElementById('refreshText').classList.remove('pulse');document.getElementById('refreshText').innerHTML='🎉 全部完成！'}
 }catch(e){document.getElementById('refreshText').textContent='⏳ 等待启动... · '+new Date().toLocaleTimeString()}
}
check();setInterval(check,2000);
</script>
</body>
</html>
